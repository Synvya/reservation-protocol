"$schema": "http://json-schema.org/draft-07/schema#"
"$id": "https://schemata.nostr.watch/note/kind/9903"
title: "Reservation Modification Request Event (Kind 9903)"
description: "Full event schema for reservation.modification.request (kind 9903) - unsigned rumor event (no sig field, per NIP-59)"
allOf:
  - type: object
    properties:
      id:
        type: string
        pattern: "^[a-f0-9]{64}$"
        description: "Deterministic event hash as defined in NIP-01"
        errorMessage: "id must be a 64-character lowercase hex string"
      content:
        type: string
        errorMessage: "content must be a string"
        description: "The content of the note"
      created_at:
        type: integer
        errorMessage: "created_at must be a timestamp expressed in seconds (not milliseconds)"
        description: "The timestamp of the note creation"
      kind:
        type: integer
      pubkey:
        type: string
        pattern: "^[a-f0-9]{64}$"
        errorMessage: "pubkey must be a secp256k1 public key"
        description: "The public key of the note's author"
      tags:
        type: array
        errorMessage: "tags must be an array of valid tag tuples"
        description: "The tags of the note"
        items:
          type: array
          minItems: 1
          items:
            type: string
    required:
      - content
      - created_at
      - kind
      - tags
    additionalProperties: false
  - type: object
    properties:
      kind:
        const: 9903
        description: "Kind 9903 identifies a reservation modification request"
        errorMessage: "kind must equal 9903"
      id:
        type: string
        pattern: "^[a-f0-9]{64}$"
        description: "Deterministic event hash as defined in NIP-01"
        errorMessage: "id must be a 64-character lowercase hex string"
      pubkey:
        type: string
        pattern: "^[a-f0-9]{64}$"
        description: "Sender public key"
        errorMessage: "pubkey must be a 64-character lowercase hex string (secp256k1 public key)"
      content:
        type: string
        description: "Reservation modification request message in plain text"
      tags:
        type: array
        items:
          type: array
          minItems: 1
          items:
            type: string
        minItems: 1
        allOf:
          - contains:
              type: array
              minItems: 2
              maxItems: 3
              items:
                - const: "p"
                  description: "Tag identifier"
                - type: string
                  pattern: "^[a-f0-9]{64}$"
                  description: "Recipient public key"
                  errorMessage: "p tag value must be a 64-character lowercase hex string"
                - type: string
                  description: "Recommended relay URL (optional)"
              additionalItems: false
            errorMessage:
              contains: "tags must include at least one p tag identifying the recipient"
          - contains:
              type: array
              minItems: 4
              maxItems: 4
              items:
                - const: "e"
                  description: "Tag identifier"
                - type: string
                  pattern: "^[a-f0-9]{64}$"
                  description: "Unsigned rumor ID of the original reservation.request (kind 9901) - connects message to reservation thread"
                  errorMessage: "e tag value must be a 64-character lowercase hex string (unsigned rumor ID)"
                - const: ""
                  description: "Empty string (relay URL not needed for rumors)"
                - const: "root"
                  description: "Marker indicating this references the root event"
              additionalItems: false
            errorMessage:
              contains: "tags must include an e tag with format ['e', '<unsigned-9901-rumor.id>', '', 'root']"
          - contains:
              type: array
              minItems: 2
              maxItems: 2
              items:
                - const: "party_size"
                  description: "Tag identifier"
                - type: string
                  pattern: "^(1[0-9]|[1-9]|20)$"
                  description: "Number of people in the reservation (integer between 1 and 20)"
                  errorMessage: "party_size must be an integer between 1 and 20"
              additionalItems: false
            errorMessage:
              contains: "tags must include a party_size tag with format ['party_size', '<integer between 1 and 20>']"
          - contains:
              type: array
              minItems: 2
              maxItems: 2
              items:
                - const: "time"
                  description: "Tag identifier"
                - type: string
                  pattern: "^[0-9]+$"
                  description: "Inclusive reservation start Unix timestamp in seconds"
                  errorMessage: "time must be a Unix timestamp in seconds"
              additionalItems: false
            errorMessage:
              contains: "tags must include a time tag with format ['time', '<unix timestamp in seconds>']"
          - contains:
              type: array
              minItems: 2
              maxItems: 2
              items:
                - const: "tzid"
                  description: "Tag identifier"
                - type: string
                  description: "Time zone of the reservation time, earliest_time, and latest_time Unix timestamps, as defined by the IANA Time Zone Database (e.g., America/Costa_Rica)"
                  errorMessage: "tzid must be a valid IANA Time Zone Database identifier"
              additionalItems: false
            errorMessage:
              contains: "tags must include a tzid tag with format ['tzid', '<IANA Time Zone Database identifier>']"
          - anyOf:
              - not:
                  contains:
                    type: array
                    minItems: 1
                    items:
                      - const: "name"
              - contains:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    - const: "name"
                      description: "Tag identifier"
                    - type: string
                      maxLength: 200
                      description: "Reservation holder name (optional, max 200 chars)"
                      errorMessage: "name must be a string with max 200 characters"
                  additionalItems: false
            errorMessage:
              anyOf: "name tag, if present, must have format ['name', '<string, max 200 chars>']"
          - anyOf:
              - not:
                  contains:
                    type: array
                    minItems: 1
                    items:
                      - const: "telephone"
              - contains:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    - const: "telephone"
                      description: "Tag identifier"
                    - type: string
                      pattern: "^tel:"
                      description: "Phone number for the reservation holder as 'tel:' URI per RFC 3966 (optional)"
                      errorMessage: "telephone must be a 'tel:' URI as per RFC 3966"
                  additionalItems: false
            errorMessage:
              anyOf: "telephone tag, if present, must have format ['telephone', '<tel: URI>']"
          - anyOf:
              - not:
                  contains:
                    type: array
                    minItems: 1
                    items:
                      - const: "email"
              - contains:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    - const: "email"
                      description: "Tag identifier"
                    - type: string
                      pattern: "^mailto:"
                      description: "Email for the reservation holder as 'mailto:' URI per RFC 6068 (optional)"
                      errorMessage: "email must be a 'mailto:' URI as per RFC 6068"
                  additionalItems: false
            errorMessage:
              anyOf: "email tag, if present, must have format ['email', '<mailto: URI>']"
          - anyOf:
              - not:
                  contains:
                    type: array
                    minItems: 1
                    items:
                      - const: "duration"
              - contains:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    - const: "duration"
                      description: "Tag identifier"
                    - type: string
                      pattern: "^[0-9]+$"
                      description: "Duration of reservation in seconds (optional)"
                      errorMessage: "duration must be a positive integer (duration in seconds)"
                  additionalItems: false
            errorMessage:
              anyOf: "duration tag, if present, must have format ['duration', '<duration in seconds>']"
          - anyOf:
              - not:
                  contains:
                    type: array
                    minItems: 1
                    items:
                      - const: "earliest_time"
              - contains:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    - const: "earliest_time"
                      description: "Tag identifier"
                    - type: string
                      pattern: "^[0-9]+$"
                      description: "Earliest start time Unix timestamp that the requestor would accept for the reservation (optional)"
                      errorMessage: "earliest_time must be a Unix timestamp in seconds"
                  additionalItems: false
            errorMessage:
              anyOf: "earliest_time tag, if present, must have format ['earliest_time', '<unix timestamp in seconds>']"
          - anyOf:
              - not:
                  contains:
                    type: array
                    minItems: 1
                    items:
                      - const: "latest_time"
              - contains:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    - const: "latest_time"
                      description: "Tag identifier"
                    - type: string
                      pattern: "^[0-9]+$"
                      description: "Latest start time Unix timestamp that the requestor would accept for the reservation (optional)"
                      errorMessage: "latest_time must be a Unix timestamp in seconds"
                  additionalItems: false
            errorMessage:
              anyOf: "latest_time tag, if present, must have format ['latest_time', '<unix timestamp in seconds>']"
    required:
      - kind
      - id
      - pubkey
  - not:
      required:
        - sig
